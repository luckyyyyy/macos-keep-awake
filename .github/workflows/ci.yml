name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build universal macOS app
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build and package
        run: ./scripts/package.sh

      - name: Inspect application architectures
        run: lipo -archs "build/KeepAwake.app/Contents/MacOS/KeepAwake"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: KeepAwake-macOS-universal
          path: dist/KeepAwake-macOS-universal.zip
          if-no-files-found: error
